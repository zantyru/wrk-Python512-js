<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex1</title>
</head>
<body>

    <p>
        Пример работы цикла <code>for</code>:<br>
        <span id="output-for"></span>
        <script>
        {
            const output = document.querySelector("#output-for");
            let text = "";

            for (let n = -5; n < 12; text += `${n++}, `);

            // Переменной n не существует за пределами цикла for

            output.innerText = text;
        }
        </script>
    </p>
</body>
</html>
